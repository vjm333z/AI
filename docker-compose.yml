# 기억사무소 RAG — 전체 스택 (인프라 + 앱)
# 시크릿은 .env 파일에서 로드. .env.example 참고.
#
# Python 서비스(reranker + STT)는 단일 컨테이너 python-svc 로 통합 (포트 8000).
services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # 최초 기동 후 별도로: docker exec -it ollama ollama pull bge-m3

  python-svc:
    build: ./python-svc
    container_name: python-svc
    ports:
      - "8000:8000"      # /rerank, /stt, /health
    environment:
      PYTHONUNBUFFERED: "1"
      # Reranker
      RERANKER_MODEL: BAAI/bge-reranker-v2-m3
      RERANKER_FP16: "true"
      # STT — Groq Whisper API only. 요약·DB 저장·호텔 매칭은 Spring(:8080)이 책임.
      GROQ_STT_API_KEY: ${GROQ_STT_API_KEY:-${GROQ_API_KEY}}
      # 공유 볼륨 루트 — Spring(/app/data)와 동일. /stt가 relative_path를 이 기준으로 해석.
      DATA_DIR: /app/data
    volumes:
      - reranker_cache:/root/.cache/huggingface
      - app_data:/app/data        # ★ 메인앱과 공유 — 녹음 파일은 여기 한 곳에만 저장됨
    restart: unless-stopped

  app:
    build: .
    container_name: rag-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      RERANKER_URL: http://python-svc:8000   # 단일 통합 서비스로 변경
      RAG_DATA_DIR: /app/data
      # 메인 PMS DB (host 178) — KOK_CALL_MNTR / 호텔 마스터 조회용
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # AIA_CALL_* 쓰기 전용 DB (host 191). AiaDataSourceConfig 가 별도 DataSource로 사용.
      STT_DB_HOST: ${STT_DB_HOST}
      STT_DB_PORT: ${STT_DB_PORT:-3306}
      STT_DB_USER: ${STT_DB_USER}
      STT_DB_PASSWORD: ${STT_DB_PASSWORD}
      STT_DB_NAME: ${STT_DB_NAME:-PMS}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RAG_RERANKER_MIN_SCORE: "0.6"
      RAG_QUERY_REWRITE_ENABLED: "true"
    volumes:
      - app_data:/app/data
    depends_on:
      - qdrant
      - ollama
      - python-svc
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_models:
  reranker_cache:
  app_data:                # 메인앱·python-svc 공유 (녹음 파일 + RAG 데이터)
  portainer_data:

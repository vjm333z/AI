version: "3.9"

# 기억사무소 RAG — 전체 스택 (인프라 + 앱)
# 시크릿은 .env 파일에서 로드. .env.example 참고.
services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # 최초 기동 후 별도로: docker exec -it ollama ollama pull bge-m3

  reranker:
    build: ./reranker
    container_name: reranker
    ports:
      - "8000:8000"
    environment:
      RERANKER_MODEL: BAAI/bge-reranker-v2-m3
      RERANKER_FP16: "true"
    volumes:
      - reranker_cache:/root/.cache/huggingface
    restart: unless-stopped

  app:
    build: .
    container_name: rag-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      RERANKER_URL: http://reranker:8000
      RAG_DATA_DIR: /app/data
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    volumes:
      - app_data:/app/data
    depends_on:
      - qdrant
      - ollama
      - reranker
    restart: unless-stopped

  mariadb-local:
    image: mariadb:10.11
    container_name: mariadb-local
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: recallai
      MYSQL_USER: recallai
      MYSQL_PASSWORD: recallai
    volumes:
      - mariadb_local_data:/var/lib/mysql
      - ./stt/sql:/docker-entrypoint-initdb.d   # 초기 DDL 자동 실행
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_models:
  reranker_cache:
  app_data:
  mariadb_local_data:
  portainer_data:


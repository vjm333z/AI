server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      initialization-fail-timeout: -1                 # DB 못붙어도 앱 시동되게 (lazy connect)

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Actuator (운영 모니터링)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Ollama 설정
ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: bge-m3
  timeout-ms: 30000          # 긴 텍스트 임베딩 여유

# Qdrant 설정
qdrant:
  url: ${QDRANT_URL:http://localhost:6333}
  collection: inquiry                               # default: 원본 REPORT 임베딩
  collection-templated: inquiry_templated           # HyDE (templatize provider 결과)
  timeout-ms: 5000

# RAG 검색 파이프라인 설정
rag:
  data-dir: ${RAG_DATA_DIR:data}      # hotels.json / last_sync.txt / failed_index.txt 저장 경로
  templatize:
    provider: groq         # HyDE 적재에 사용할 LLM provider. 현재 구현체: groq
  search:
    top-k: 10              # Qdrant에서 꺼낼 후보 수 (reranker 대비 넉넉히)
    final-top-k: 4         # 최종 LLM에 넘길 문서 수
    score-threshold: 0.65  # Qdrant cosine 유사도 하한 (bge-m3 기준 0.65+가 "관련 있음")
    faq-score-threshold: 0.60  # FAQ 전용 하한
  reranker:
    enabled: true          # Python FastAPI reranker 서비스 기동 완료 시 true
    url: ${RERANKER_URL:http://localhost:8000}
    timeout-ms: 20000
    min-score: 0.6         # rerank_score 컷 — 0.5 근처는 "무관" 신호. 이 아래면 사례에서 제외
  dedup:
    enabled: true              # MMR 기반 다양성 재정렬 — Top 1은 그대로, 나머지만 재선택
    jaccard-threshold: 0.7     # 이 이상이면 "유사 중복"으로 간주 (0.7 = 70% 토큰 겹침)
    lambda: 0.7                # 관련성 : 다양성 가중치. 0.7 = 관련성 70% / 다양성 30%
  query-rewrite:
    enabled: true          # true로 켜면 Groq로 검색 전 질의 확장
    timeout-ms: 3000
  scheduler:
    enabled: false         # 사외 작업 중: 03:00 자동 증분 적재 OFF (회사 복귀 시 true)
    cron: "0 0 3 * * *"

# Groq API 설정 (RAG 답변 기본 LLM, HyDE templatize 공용)
groq:
  api-key: ${GROQ_API_KEY}
  model: llama-3.3-70b-versatile
  url: https://api.groq.com/openai/v1/chat/completions
  timeout-ms: 30000

# OpenAI API 설정 (Groq 실패 시 폴백)
openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
  url: https://api.openai.com/v1/chat/completions
  timeout-ms: 30000
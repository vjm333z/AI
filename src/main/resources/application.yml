server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL:jdbc:mariadb://211.34.228.178:3336/PMS}
    username: ${DB_USERNAME:DEV}
    password: ${DB_PASSWORD}
    hikari:
      initialization-fail-timeout: -1                 # DB 못붙어도 앱 시동되게 (lazy connect)

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Actuator (운영 모니터링)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Ollama 설정
ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: bge-m3
  timeout-ms: 30000          # 긴 텍스트 임베딩 여유

# Qdrant 설정
qdrant:
  url: ${QDRANT_URL:http://localhost:6333}
  collection: inquiry                 # default: 원본 REPORT 임베딩
  collection-templated: inquiry_templated   # HyDE 하이브리드 임베딩 (A/B 비교)
  timeout-ms: 5000

# RAG 검색 파이프라인 설정
rag:
  data-dir: ${RAG_DATA_DIR:data}      # hotels.json / phone_lookup.json / last_sync.txt / failed_index.txt 저장 경로
  templatize:
    provider: groq         # HyDE 적재에 사용할 LLM provider. 옵션: groq (구현됨) / claude / gemini / openai (확장 가능)
  search:
    top-k: 10              # Qdrant에서 꺼낼 후보 수 (reranker 대비 넉넉히)
    final-top-k: 3         # 최종 LLM에 넘길 문서 수
    score-threshold: 0.65  # Qdrant cosine 유사도 하한 (bge-m3 기준 0.65+가 "관련 있음")
  reranker:
    enabled: true          # Python FastAPI reranker 서비스 기동 완료 시 true
    url: ${RERANKER_URL:http://localhost:8000}
    timeout-ms: 5000
    min-score: 0.6         # rerank_score 컷 — 0.5 근처는 "무관" 신호. 이 아래면 사례에서 제외
  dedup:
    enabled: true              # MMR 기반 다양성 재정렬 — Top 1은 그대로, 나머지만 재선택
    jaccard-threshold: 0.7     # 이 이상이면 "유사 중복"으로 간주 (0.7 = 70% 토큰 겹침)
    lambda: 0.7                # 관련성 : 다양성 가중치. 0.7 = 관련성 70% / 다양성 30%
  query-rewrite:
    enabled: true          # true로 켜면 Groq로 검색 전 질의 확장
    timeout-ms: 3000
  scheduler:
    enabled: false         # 사외 작업 중: 03:00 자동 증분 적재 OFF (회사 복귀 시 true)
    cron: "0 0 3 * * *"

# Claude API 설정
claude:
  api-key: ${CLAUDE_API_KEY}
  model: claude-sonnet-4-20250514

groq:
  api-key: ${GROQ_API_KEY}
  model: llama-3.3-70b-versatile
  url: https://api.groq.com/openai/v1/chat/completions
  timeout-ms: 30000

# 로컬 recallai DB (CALL_QUEUE) — 나중에 PMS DB로 이전 시 이 값만 교체
local:
  datasource:
    url: ${LOCAL_DB_URL:jdbc:mariadb://127.0.0.1:3307/recallai}
    username: ${LOCAL_DB_USERNAME:recallai}
    password: ${LOCAL_DB_PASSWORD:recallai}